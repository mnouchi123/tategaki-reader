<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="縦書文庫">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>縦書文庫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

:root {
  --bg: #f5f0e8;
  --text: #2a2218;
  --accent: #8b6914;
  --accent-light: #c4a35a;
  --panel-bg: rgba(235,229,216,0.96);
  --fs: 18;
}
[data-theme="dark"] {
  --bg: #1a1814;
  --text: #d4cfc4;
  --accent: #c4a35a;
  --accent-light: #8b6914;
  --panel-bg: rgba(42,37,32,0.96);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Serif JP','Hiragino Mincho ProN','YuMincho',serif;
  background:var(--bg);color:var(--text);
  overflow:hidden;position:fixed;inset:0;
  transition:background .3s,color .3s;
}

/* ===== LANDING ===== */
#landing{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s;
}
#landing.hide{opacity:0;pointer-events:none}
.ltitle{writing-mode:vertical-rl;font-size:36px;letter-spacing:.3em;color:var(--accent);font-weight:700;margin-bottom:12px}
.lsub{writing-mode:vertical-rl;font-size:13px;opacity:.4;margin-bottom:48px;letter-spacing:.12em}
.fbtn{
  background:var(--accent);color:#fff;border:none;
  padding:14px 44px;font-size:16px;font-family:inherit;
  border-radius:8px;cursor:pointer;letter-spacing:.1em;
}
.fbtn:active{transform:scale(.95)}
#fi{display:none}
.rlist{margin-top:32px;width:280px;display:flex;flex-direction:column;gap:6px}
.rhead{font-size:12px;opacity:.4;text-align:center;margin-bottom:4px}
.ritem{
  background:var(--panel-bg);border:none;padding:10px 16px;border-radius:8px;
  font-family:inherit;font-size:13px;color:var(--text);cursor:pointer;
  text-align:left;display:flex;justify-content:space-between;align-items:center;
}
.ritem:active{opacity:.7}
.rpct{font-size:11px;color:var(--accent)}

/* ===== READER ===== */
#reader{display:none;position:fixed;inset:0}
#reader.on{display:block}

#content{
  writing-mode:vertical-rl;
  text-orientation:mixed;
  line-height:1.85;
  padding:36px 28px;
  padding-top:max(36px,env(safe-area-inset-top,36px));
  padding-bottom:max(36px,env(safe-area-inset-bottom,36px));
  height:100%;width:100%;
  overflow:hidden;
  word-break:break-all;
  text-align:justify;
  -webkit-user-select:text;user-select:text;
}
#content p{text-indent:1em;margin-bottom:.4em}

/* ===== BARS ===== */
#tbar,#bbar{
  position:fixed;left:0;right:0;
  background:var(--panel-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;
}
#tbar{top:0;padding:max(12px,env(safe-area-inset-top,12px)) 12px 8px;display:flex;align-items:center;justify-content:space-between}
#bbar{bottom:0;padding:12px 16px max(12px,env(safe-area-inset-bottom,12px));display:flex;flex-direction:column;gap:8px}
#tbar.on,#bbar.on{opacity:1;pointer-events:auto}
.btitle{font-size:13px;opacity:.6;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px}

.brow{display:flex;align-items:center;gap:10px}
.b{
  background:none;border:1px solid var(--accent-light);color:var(--text);
  min-width:36px;height:36px;border-radius:8px;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:inherit;padding:0 6px;
}
.b:active{background:var(--accent);color:#fff}
.sw{flex:1;display:flex;align-items:center;gap:8px}
#slider{flex:1;accent-color:var(--accent)}
.pn{font-size:12px;opacity:.5;min-width:55px;text-align:center}

#prog{position:fixed;bottom:0;left:0;height:3px;background:var(--accent);z-index:60;transition:width .3s;pointer-events:none}

#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-14px);
  background:var(--accent);color:#fff;padding:7px 20px;border-radius:18px;font-size:13px;
  opacity:0;transition:opacity .3s,transform .3s;z-index:200;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LANDING -->
<div id="landing">
  <div class="ltitle">縦書文庫</div>
  <div class="lsub">テキストリーダー</div>
  <button class="fbtn" onclick="$('fi').click()">ファイルを開く</button>
  <input type="file" id="fi" accept=".txt,.text,text/plain">
  <div class="rlist" id="rlist"></div>
</div>

<!-- READER -->
<div id="reader">
  <div id="content"></div>
  <div id="tbar">
    <button class="b" onclick="goHome()">✕ 戻る</button>
    <span class="btitle" id="btitle"></span>
    <button class="b" id="tbtn" onclick="togTheme()">🌙</button>
  </div>
  <div id="bbar">
    <div class="brow">
      <button class="b" onclick="adjF(-2)">A−</button>
      <button class="b" onclick="adjF(2)"><b>A+</b></button>
      <div class="sw">
        <input type="range" id="slider" min="0" max="1" value="0">
        <span class="pn" id="pn">1/1</span>
      </div>
    </div>
  </div>
  <div id="prog"></div>
</div>

<script>
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1600)}

/* ── State ── */
let raw='', fname='', fs=18, pg=0, tp=1, bars=false;
let charPages=[]; // array of strings, one per page

/* ── File ── */
$('fi').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  fname=f.name.replace(/\.(txt|text)$/i,'');
  const r=new FileReader();
  r.onload=ev=>{raw=ev.target.result; startRead()};
  r.readAsText(f,'UTF-8');
  e.target.value='';
});

/* ── Simple character-count pagination ──
   Estimate chars per page from screen size and font size.
   This avoids any heavy DOM measurement.
*/
function calcCharsPerPage(){
  const el=$('content');
  const h=el.clientHeight;
  const w=el.clientWidth;
  // padding ~ 36px each side
  const usableH=h-72;
  const usableW=w-56;
  // vertical-rl: chars go top-to-bottom, columns go right-to-left
  const charH=fs*1.85; // font-size * line-height ≈ height per char cell
  const colW=fs*1.85;  // column width ≈ font size * line-height
  const charsPerCol=Math.max(1,Math.floor(usableH/fs));
  const numCols=Math.max(1,Math.floor(usableW/colW));
  return Math.max(50, charsPerCol*numCols);
}

function buildPages(){
  const cpp=calcCharsPerPage();
  charPages=[];

  // Split raw text preserving paragraph structure
  // We'll work with a flat approach: count visible characters
  // but keep paragraph breaks as natural page-break points

  const lines=raw.split('\n');
  let currentPage='';
  let currentCount=0;

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const lineLen=line.length||1; // blank line counts as 1

    if(currentCount+lineLen > cpp && currentCount > 0){
      // This line would overflow. Save current page.
      charPages.push(currentPage);
      currentPage='';
      currentCount=0;
    }

    // If a single line is longer than a page, split it
    if(lineLen > cpp){
      let pos=0;
      while(pos<line.length){
        const remaining=cpp-currentCount;
        const chunk=line.substring(pos, pos+remaining);
        currentPage+=(currentPage?'\n':'')+chunk;
        currentCount+=chunk.length;
        pos+=remaining;
        if(currentCount>=cpp && pos<line.length){
          charPages.push(currentPage);
          currentPage='';
          currentCount=0;
        }
      }
    } else {
      currentPage+=(currentPage?'\n':'')+line;
      currentCount+=lineLen;
    }
  }

  if(currentPage.trim()){
    charPages.push(currentPage);
  }

  if(charPages.length===0) charPages.push('');
  tp=charPages.length;
}

function render(n){
  n=Math.max(0,Math.min(tp-1,n));
  pg=n;
  const el=$('content');
  el.style.fontSize=fs+'px';
  el.innerHTML='';

  const text=charPages[n]||'';
  const lines=text.split('\n');
  lines.forEach(line=>{
    const p=document.createElement('p');
    if(line.trim()===''){
      p.innerHTML='\u3000';
    } else {
      p.textContent=line;
    }
    el.appendChild(p);
  });

  updUI();
}

function updUI(){
  $('pn').textContent=`${pg+1} / ${tp}`;
  $('slider').max=Math.max(0,tp-1);
  $('slider').value=pg;
  $('prog').style.width=(tp>1?(pg/(tp-1))*100:0)+'%';
}

/* ── Navigation ── */
function go(n,anim){
  n=Math.max(0,Math.min(tp-1,n));
  if(anim&&n!==pg){
    $('content').style.opacity='0.15';
    setTimeout(()=>{render(n);$('content').style.opacity='1';savePos()},120);
  } else {
    render(n);
  }
}
function prev(){go(pg-1,true)}
function next(){go(pg+1,true)}

/* ── Touch handling ── */
let tx=0,ty=0,tt=0,tm=false;

document.addEventListener('touchstart',e=>{
  if(!$('reader').classList.contains('on')) return;
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();tm=false;
},{passive:true});

document.addEventListener('touchmove',e=>{
  if(!$('reader').classList.contains('on')) return;
  if(Math.abs(e.touches[0].clientX-tx)>12||Math.abs(e.touches[0].clientY-ty)>12) tm=true;
},{passive:true});

document.addEventListener('touchend',e=>{
  if(!$('reader').classList.contains('on')) return;
  const tgt=e.target;
  if(tgt.closest('#tbar')||tgt.closest('#bbar')) return;

  const dt=Date.now()-tt;
  const ex=e.changedTouches[0].clientX;
  const dx=ex-tx;

  // Swipe
  if(tm&&Math.abs(dx)>50&&dt<500){
    dx>0?prev():next(); return;
  }

  // Quick tap
  if(!tm&&dt<300){
    const w=window.innerWidth;
    if(bars){togBars();return}
    if(ex>w*0.65) prev();
    else if(ex<w*0.35) next();
    else togBars();
  }
},{passive:true});

$('slider').addEventListener('input',e=>go(+e.target.value,false));

/* ── Font ── */
function adjF(d){
  const ratio=tp>1?pg/(tp-1):0;
  fs=Math.max(12,Math.min(40,fs+d));
  buildPages();
  go(Math.round(ratio*(tp-1)),false);
  try{localStorage.setItem('tr-fs',fs)}catch(e){}
}

/* ── Theme ── */
function togTheme(){
  const dk=!document.body.hasAttribute('data-theme');
  document.body.toggleAttribute('data-theme',dk);
  $('tbtn').textContent=dk?'☀️':'🌙';
  try{localStorage.setItem('tr-th',dk?'d':'l')}catch(e){}
}

/* ── Bars ── */
function togBars(){
  bars=!bars;
  $('tbar').classList.toggle('on',bars);
  $('bbar').classList.toggle('on',bars);
}

/* ── Bookmark ── */
function savePos(){
  try{
    const bm=JSON.parse(localStorage.getItem('tr-bm')||'{}');
    bm[fname]={p:pg,t:tp,d:Date.now()};
    localStorage.setItem('tr-bm',JSON.stringify(bm));
  }catch(e){}
}
function loadPos(){
  try{return(JSON.parse(localStorage.getItem('tr-bm')||'{}'))[fname]||null}catch(e){return null}
}

/* ── Recent ── */
function showRecent(){
  const el=$('rlist');el.innerHTML='';
  try{
    const bm=JSON.parse(localStorage.getItem('tr-bm')||'{}');
    const ls=Object.entries(bm).sort((a,b)=>(b[1].d||0)-(a[1].d||0)).slice(0,5);
    if(!ls.length) return;
    el.innerHTML='<div class="rhead">最近の本</div>';
    ls.forEach(([n,d])=>{
      const pct=d.t>1?Math.round((d.p/(d.t-1))*100):0;
      const b=document.createElement('button');b.className='ritem';
      b.innerHTML=`<span>${n}</span><span class="rpct">${pct}%</span>`;
      b.onclick=()=>{toast('ファイルを再度選択してください');$('fi').click()};
      el.appendChild(b);
    });
  }catch(e){}
}

/* ── Start / Home ── */
function startRead(){
  $('landing').classList.add('hide');
  $('reader').classList.add('on');
  $('btitle').textContent=fname;
  bars=false;
  setTimeout(()=>{
    buildPages();
    const bm=loadPos();
    if(bm&&bm.p>0&&bm.p<tp){
      go(bm.p,false);
      toast(`${bm.p+1}ページから再開`);
    } else {
      go(0,false);
    }
  },50);
}

function goHome(){
  savePos();
  $('reader').classList.remove('on');
  $('landing').classList.remove('hide');
  bars=false;$('tbar').classList.remove('on');$('bbar').classList.remove('on');
  showRecent();
}

/* ── Keyboard ── */
document.addEventListener('keydown',e=>{
  if(!$('reader').classList.contains('on')) return;
  if(e.key==='ArrowLeft') next();
  if(e.key==='ArrowRight') prev();
});

/* ── Resize ── */
let rT;
window.addEventListener('resize',()=>{
  clearTimeout(rT);
  rT=setTimeout(()=>{
    if($('reader').classList.contains('on')){
      const ratio=tp>1?pg/(tp-1):0;
      buildPages();
      go(Math.round(ratio*(tp-1)),false);
    }
  },300);
});

/* ── Init ── */
try{
  if(localStorage.getItem('tr-th')==='d'){document.body.setAttribute('data-theme','dark');$('tbtn').textContent='☀️'}
  const f=localStorage.getItem('tr-fs');if(f)fs=+f;
}catch(e){}
showRecent();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
