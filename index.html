<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="縦書文庫">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>縦書文庫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

:root {
  --bg: #f5f0e8;
  --text: #2a2218;
  --accent: #8b6914;
  --accent-light: #c4a35a;
  --panel-bg: rgba(235,229,216,0.96);
}
[data-theme="dark"] {
  --bg: #1a1814;
  --text: #d4cfc4;
  --accent: #c4a35a;
  --accent-light: #8b6914;
  --panel-bg: rgba(42,37,32,0.96);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html, body {
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Serif JP','Hiragino Mincho ProN','YuMincho',serif;
  transition:background .3s,color .3s;
}

/* ===== LANDING ===== */
#landing{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s;
}
#landing.hide{opacity:0;pointer-events:none}
.ltitle{writing-mode:vertical-rl;font-size:36px;letter-spacing:.3em;color:var(--accent);font-weight:700;margin-bottom:12px}
.lsub{writing-mode:vertical-rl;font-size:13px;opacity:.4;margin-bottom:48px;letter-spacing:.12em}
.fbtn{
  background:var(--accent);color:#fff;border:none;
  padding:14px 44px;font-size:16px;font-family:inherit;
  border-radius:8px;cursor:pointer;letter-spacing:.1em;
}
.fbtn:active{transform:scale(.95)}
#fi{display:none}
.rlist{margin-top:32px;width:280px;display:flex;flex-direction:column;gap:6px}
.rhead{font-size:12px;opacity:.4;text-align:center;margin-bottom:4px}
.ritem{
  background:var(--panel-bg);border:none;padding:10px 16px;border-radius:8px;
  font-family:inherit;font-size:13px;color:var(--text);cursor:pointer;
  text-align:left;display:flex;justify-content:space-between;align-items:center;gap:8px;
}
.ritem:active{opacity:.7}
.rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rpct{font-size:11px;color:var(--accent);white-space:nowrap}
.rdel{background:none;border:none;color:var(--accent-light);font-size:14px;cursor:pointer;padding:2px 6px;flex-shrink:0}
.rdel:active{color:var(--accent)}

/* ===== READER ===== */
#reader{display:none;position:fixed;inset:0;}
#reader.on{display:block}

/*
  ★V5: CSSマルチカラム廃止・行数固定ページネーション
  #viewport: safe-area吸収
  #book:     1ページ分のテキストを表示する縦書きコンテナ
*/
#viewport{
  position:fixed;
  inset:0;
  height:100dvh;
  box-sizing:border-box;
  overflow:hidden;
  padding-top:    env(safe-area-inset-top, 44px);
  padding-right:  max(env(safe-area-inset-right, 0px), 20px);
  padding-bottom: env(safe-area-inset-bottom, 34px);
  padding-left:   max(env(safe-area-inset-left, 0px), 20px);
}

#book{
  width:100%;
  height:100%;
  overflow:hidden;

  writing-mode:vertical-rl;
  text-orientation:mixed;

  line-height:1.85;
  word-break:break-all;
  text-align:justify;
  -webkit-user-select:text;user-select:text;
}

#book p{
  all:unset;
  display:block;
  font-family:'Noto Serif JP','Hiragino Mincho ProN','YuMincho',serif;
  font-size:inherit;
  line-height:inherit;
  color:inherit;
  text-indent:1em;
  margin-bottom:0;
  word-break:break-all;
}

/* ===== BARS ===== */
#tbar,#bbar{
  position:fixed;left:0;right:0;
  background:var(--panel-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;
}
#tbar{
  top:0;
  padding:max(12px,env(safe-area-inset-top,12px)) 12px 8px;
  display:flex;align-items:center;justify-content:space-between;
}
#bbar{
  bottom:0;
  padding:12px 16px max(12px,env(safe-area-inset-bottom,12px));
  display:flex;flex-direction:column;gap:8px;
}
#tbar.on,#bbar.on{opacity:1;pointer-events:auto}
.btitle{font-size:13px;opacity:.6;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px}
.brow{display:flex;align-items:center;gap:10px}
.b{
  background:none;border:1px solid var(--accent-light);color:var(--text);
  min-width:36px;height:36px;border-radius:8px;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:inherit;padding:0 6px;
}
.b:active{background:var(--accent);color:#fff}
.sw{flex:1;display:flex;align-items:center;gap:8px}
#slider{flex:1;accent-color:var(--accent)}
.pn{font-size:12px;opacity:.5;min-width:55px;text-align:center}
#prog{position:fixed;bottom:0;left:0;height:3px;background:var(--accent);z-index:60;transition:width .3s;pointer-events:none}

#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-14px);
  background:var(--accent);color:#fff;padding:7px 20px;border-radius:18px;font-size:13px;
  opacity:0;transition:opacity .3s,transform .3s;z-index:200;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

#loading{
  position:fixed;inset:0;z-index:300;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#loading.on{opacity:1;pointer-events:auto}
.spinner{width:36px;height:36px;border:3px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltext{font-size:13px;opacity:.5;letter-spacing:.1em}
</style>
</head>
<body>
<div id="toast"></div>
<div id="loading"><div class="spinner"></div><div class="ltext" id="ltxt">ページ構築中…</div></div>

<!-- LANDING -->
<div id="landing">
  <div class="ltitle">縦書文庫</div>
  <div class="lsub">テキストリーダー</div>
  <button class="fbtn" onclick="$('fi').click()">ファイルを開く</button>
  <input type="file" id="fi" accept=".txt,.text,text/plain">
  <div class="rlist" id="rlist"></div>
</div>

<!-- READER -->
<div id="reader">
  <div id="viewport">
    <div id="book">
      <!-- 1ページ分のテキストがここに入る -->
    </div>
  </div>

  <div id="tbar">
    <button class="b" onclick="goHome()">✕ 戻る</button>
    <span class="btitle" id="btitle"></span>
    <button class="b" id="tbtn" onclick="togTheme()">🌙</button>
  </div>
  <div id="bbar">
    <div class="brow">
      <button class="b" onclick="adjF(-2)">A−</button>
      <button class="b" onclick="adjF(2)"><b>A+</b></button>
      <div class="sw">
        <input type="range" id="slider" min="0" max="1" value="0">
        <span class="pn" id="pn">1/1</span>
      </div>
    </div>
  </div>
  <div id="prog"></div>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const LINE_HEIGHT = 1.85;

function toast(m){
  const t=$('toast');t.textContent=m;
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),1800);
}
function showLoading(b,msg){
  $('ltxt').textContent=msg||'ページ構築中…';
  $('loading').classList.toggle('on',b);
}

/* ══ IndexedDB ══ */
const DB_NAME='tategaki-reader',DB_VER=2,MAX_BOOKS=5,SPLIT_BYTES=900*1024;
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('books'))d.createObjectStore('books',{keyPath:'id'});
      if(!d.objectStoreNames.contains('pos'))d.createObjectStore('pos',{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=()=>rej(req.error);
  });
}
const dbGet=(s,k)=>new Promise((res,rej)=>{const r=db.transaction(s,'readonly').objectStore(s).get(k);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error)});
const dbPut=(s,v)=>new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).put(v);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});
const dbGetAll=s=>new Promise((res,rej)=>{const r=db.transaction(s,'readonly').objectStore(s).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)});
const dbDelete=(s,k)=>new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});

function splitText(text,baseName){
  const enc=new TextEncoder();
  if(enc.encode(text).length<=SPLIT_BYTES)return[{id:baseName,text}];
  const lines=text.split('\n');
  const parts=[];let buf=[],bufBytes=0,n=1;
  for(const line of lines){
    const lb=enc.encode(line+'\n').length;
    if(bufBytes+lb>SPLIT_BYTES&&buf.length>0){parts.push({id:`${baseName}（${n}）`,text:buf.join('\n')});n++;buf=[line];bufBytes=lb;}
    else{buf.push(line);bufBytes+=lb;}
  }
  if(buf.length>0)parts.push({id:`${baseName}（${n}）`,text:buf.join('\n')});
  return parts;
}

async function saveBook(id,text){
  const all=await dbGetAll('books');
  if(!all.find(b=>b.id===id)&&all.length>=MAX_BOOKS){
    const old=all.sort((a,b)=>a.savedAt-b.savedAt)[0];
    await dbDelete('books',old.id);await dbDelete('pos',old.id);
  }
  await dbPut('books',{id,text,savedAt:Date.now()});
}
async function savePos(id,pct){
  await dbPut('pos',{id,pct});
  const bk=await dbGet('books',id);
  if(bk){bk.savedAt=Date.now();await dbPut('books',bk);}
}

/* ══ State ══ */
let raw='',fname='',fs=18,pg=0,tp=1,bars=false;
let pages=[];       /* ページ配列: pages[i] = { lines: [...] } */
let linesPerPage=0; /* 1ページあたりの行数 */
let charsPerLine=0; /* 1行あたりの文字数 */

/* ══ V5: 画面寸法から行数・文字数を計算 ══ */
function calcLayout(){
  const vp=$('viewport');
  const cs=getComputedStyle(vp);
  const rect=vp.getBoundingClientRect();
  const usableW=rect.width - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const usableH=rect.height - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);

  const lineAdvance=fs*LINE_HEIGHT; /* 1行の送り幅（縦書きでは横方向） */
  linesPerPage=Math.floor(usableW/lineAdvance);
  charsPerLine=Math.floor(usableH/fs);

  console.log('[V5 calcLayout]',{fs,usableW,usableH,lineAdvance,linesPerPage,charsPerLine});
}

/* ══ V5: テキストをページ配列に分割 ══
   段落単位で詰める。段落が入りきらない場合は文字数で分割する。
*/
function paginateText(){
  pages=[];
  if(!raw)return;

  /* テキストを段落に分割 */
  const paragraphs=raw.split('\n');

  /* 各段落を「行数いくつ分か」に変換し、ページに詰めていく */
  let currentPage=[];
  let currentLines=0;

  for(let pi=0;pi<paragraphs.length;pi++){
    const para=paragraphs[pi];
    const text=para.trim()===''?'　':para; /* 空行は全角スペース */

    /* この段落が何行使うか（text-indent:1em分を考慮） */
    const effectiveChars=charsPerLine-1; /* 1em字下げ分 */
    const paraLines=Math.max(1,Math.ceil(text.length/effectiveChars));

    if(currentLines+paraLines<=linesPerPage){
      /* 現在のページに収まる */
      currentPage.push(text);
      currentLines+=paraLines;
    } else {
      /* 収まらない場合 */
      const remaining=linesPerPage-currentLines;

      if(remaining>=1&&paraLines>linesPerPage){
        /* 長い段落：残り行数分だけ切り出して現ページに入れ、残りを次へ */
        const cutAt=remaining*effectiveChars;
        currentPage.push(text.substring(0,cutAt));
        pages.push(currentPage);

        /* 残りの文字列を引き続き分割 */
        let rest=text.substring(cutAt);
        while(rest.length>0){
          const chunk=linesPerPage*charsPerLine; /* 字下げなし（継続行） */
          if(rest.length<=chunk){
            currentPage=[rest];
            currentLines=Math.max(1,Math.ceil(rest.length/charsPerLine));
            rest='';
          } else {
            pages.push([rest.substring(0,chunk)]);
            rest=rest.substring(chunk);
          }
        }
        if(rest.length===0&&currentPage.length===0){
          currentPage=[];
          currentLines=0;
        }
      } else {
        /* 短い段落だが入らない：現ページを閉じて新ページへ */
        if(currentPage.length>0)pages.push(currentPage);
        currentPage=[text];
        currentLines=paraLines;
      }
    }
  }
  /* 最後のページを追加 */
  if(currentPage.length>0)pages.push(currentPage);

  tp=pages.length;
  console.log('[V5 paginateText]',{totalParagraphs:paragraphs.length,totalPages:tp,linesPerPage,charsPerLine});
}

/* ══ V5: 現在ページをDOMに描画 ══ */
function render(){
  const book=$('book');
  book.style.fontSize=fs+'px';
  book.innerHTML='';

  if(pg<0)pg=0;
  if(pg>=tp)pg=tp-1;
  if(!pages[pg])return;

  const frag=document.createDocumentFragment();
  for(const text of pages[pg]){
    const p=document.createElement('p');
    p.textContent=text;
    frag.appendChild(p);
  }
  book.appendChild(frag);
  updUI();
}

function updUI(){
  $('pn').textContent=`${pg+1} / ${tp}`;
  $('slider').max=Math.max(0,tp-1);
  $('slider').value=pg;
  $('prog').style.width=(tp>1?(pg/(tp-1))*100:0)+'%';
}

function persistPos(){
  const pct=tp>1?pg/(tp-1):0;
  savePos(fname,pct).catch(()=>{});
}

function pctToPage(pct){return Math.round(pct*(tp-1));}

/* ══ relayout：フォントサイズ変更・回転など ══ */
let relayoutScheduled=false;
function relayout(){
  relayoutScheduled=false;
  const pct=tp>1?pg/(tp-1):0;
  calcLayout();
  paginateText();
  pg=Math.min(pctToPage(pct),tp-1);
  render();
  showLoading(false);
}
function requestRelayout(){
  if(relayoutScheduled)return;
  relayoutScheduled=true;
  requestAnimationFrame(()=>relayout());
}

/* ══ 書籍を開く ══ */
async function openBook(id,text){
  fname=id;raw=text;
  $('landing').classList.add('hide');
  $('reader').classList.add('on');
  $('btitle').textContent=fname;
  bars=false;
  showLoading(true,'ページ構築中…');

  /* フォントロード待ち */
  if(document.fonts?.ready){
    try{await document.fonts.ready;}catch(e){}
  }

  calcLayout();
  paginateText();

  const posRec=await dbGet('pos',fname);
  pg=0;
  if(posRec&&posRec.pct>0)pg=pctToPage(posRec.pct);
  pg=Math.min(pg,tp-1);
  render();
  showLoading(false);
  if(posRec&&posRec.pct>0)toast(`${pg+1}ページから再開`);
}

/* ══ ページ送り ══ */
function gotoPage(n,anim){
  n=Math.max(0,Math.min(tp-1,n));pg=n;
  const book=$('book');
  if(anim){
    book.style.opacity='0.15';
    setTimeout(()=>{render();book.style.opacity='1';persistPos();},120);
  } else {
    render();persistPos();
  }
}
function prev(){gotoPage(pg-1,true)}
function next(){gotoPage(pg+1,true)}

/* ══ タッチ ══ */
let tx=0,ty=0,tt=0,tm=false;
document.addEventListener('touchstart',e=>{
  if(!$('reader').classList.contains('on'))return;
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();tm=false;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!$('reader').classList.contains('on'))return;
  if(Math.abs(e.touches[0].clientX-tx)>12||Math.abs(e.touches[0].clientY-ty)>12)tm=true;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!$('reader').classList.contains('on'))return;
  if(e.target.closest('#tbar')||e.target.closest('#bbar'))return;
  const dt=Date.now()-tt,ex=e.changedTouches[0].clientX,dx=ex-tx;
  if(tm&&Math.abs(dx)>50&&dt<500){dx>0?prev():next();return;}
  if(!tm&&dt<300){
    if(bars){togBars();return;}
    const w=window.innerWidth;
    if(ex>w*0.65)prev();
    else if(ex<w*0.35)next();
    else togBars();
  }
},{passive:true});

$('slider').addEventListener('input',e=>gotoPage(+e.target.value,false));

/* ══ フォントサイズ ══ */
function adjF(d){
  fs=Math.max(12,Math.min(40,fs+d));
  try{localStorage.setItem('tr-fs',fs);}catch(e){}
  showLoading(true);
  requestRelayout();
}

/* ══ テーマ ══ */
function togTheme(){
  const dk=!document.body.hasAttribute('data-theme');
  document.body.toggleAttribute('data-theme',dk);
  $('tbtn').textContent=dk?'☀️':'🌙';
  try{localStorage.setItem('tr-th',dk?'d':'l');}catch(e){}
}

/* ══ バー ══ */
function togBars(){bars=!bars;$('tbar').classList.toggle('on',bars);$('bbar').classList.toggle('on',bars);}

/* ══ ホーム ══ */
function goHome(){
  persistPos();
  $('reader').classList.remove('on');
  $('landing').classList.remove('hide');
  bars=false;$('tbar').classList.remove('on');$('bbar').classList.remove('on');
  showRecent();
}

/* ══ 最近の本 ══ */
async function showRecent(){
  const el=$('rlist');el.innerHTML='';
  const all=await dbGetAll('books');
  if(!all.length)return;
  el.innerHTML='<div class="rhead">最近の本</div>';
  for(const bk of all.sort((a,b)=>b.savedAt-a.savedAt)){
    const posRec=await dbGet('pos',bk.id);
    const pct=posRec?Math.round(posRec.pct*100):0;
    const row=document.createElement('div');
    row.className='ritem';
    row.innerHTML=`<span class="rname">${bk.id}</span><span class="rpct">${pct}%</span><button class="rdel" title="削除">✕</button>`;
    const open=()=>openBook(bk.id,bk.text);
    row.querySelector('.rname').onclick=open;
    row.querySelector('.rpct').onclick=open;
    row.querySelector('.rdel').onclick=async ev=>{
      ev.stopPropagation();
      await dbDelete('books',bk.id);await dbDelete('pos',bk.id);showRecent();
    };
    el.appendChild(row);
  }
}

/* ══ キーボード ══ */
document.addEventListener('keydown',e=>{
  if(!$('reader').classList.contains('on'))return;
  if(e.key==='ArrowLeft')next();
  if(e.key==='ArrowRight')prev();
});

/* ══ リサイズ対応 ══ */
new ResizeObserver(()=>{
  if(!$('reader').classList.contains('on'))return;
  showLoading(true);
  requestRelayout();
}).observe(document.getElementById('viewport'));

window.addEventListener('orientationchange',()=>{
  if(!$('reader').classList.contains('on'))return;
  showLoading(true);
  requestRelayout();
});

if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    if(!$('reader').classList.contains('on'))return;
    requestRelayout();
  });
}

/* ══ ファイル読み込み ══ */
$('fi').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  const baseName=f.name.replace(/\.(txt|text)$/i,'');
  showLoading(true,'ファイル読み込み中…');
  const reader=new FileReader();
  reader.onload=async ev=>{
    const text=ev.target.result;
    const parts=splitText(text,baseName);
    for(const p of parts)await saveBook(p.id,p.text);
    if(parts.length>1)toast(`${parts.length}パートに分割して保存`);
    showLoading(false);
    openBook(parts[0].id,parts[0].text);
  };
  reader.readAsText(f,'UTF-8');
  e.target.value='';
});

/* ══ 初期化 ══ */
(async()=>{
  try{
    if(localStorage.getItem('tr-th')==='d'){document.body.setAttribute('data-theme','dark');$('tbtn').textContent='☀️';}
    const f=localStorage.getItem('tr-fs');if(f)fs=+f;
  }catch(e){}
  await openDB();
  showRecent();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
</script>
</body>
</html>
