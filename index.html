<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="縦書文庫">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>縦書文庫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

:root {
  --bg: #f5f0e8;
  --text: #2a2218;
  --accent: #8b6914;
  --accent-light: #c4a35a;
  --panel-bg: rgba(235,229,216,0.96);
}
[data-theme="dark"] {
  --bg: #1a1814;
  --text: #d4cfc4;
  --accent: #c4a35a;
  --accent-light: #8b6914;
  --panel-bg: rgba(42,37,32,0.96);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Serif JP','Hiragino Mincho ProN','YuMincho',serif;
  background:var(--bg);color:var(--text);
  overflow:hidden;position:fixed;inset:0;
  transition:background .3s,color .3s;
}

/* ===== LANDING ===== */
#landing{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s;
}
#landing.hide{opacity:0;pointer-events:none}
.ltitle{writing-mode:vertical-rl;font-size:36px;letter-spacing:.3em;color:var(--accent);font-weight:700;margin-bottom:12px}
.lsub{writing-mode:vertical-rl;font-size:13px;opacity:.4;margin-bottom:48px;letter-spacing:.12em}
.fbtn{
  background:var(--accent);color:#fff;border:none;
  padding:14px 44px;font-size:16px;font-family:inherit;
  border-radius:8px;cursor:pointer;letter-spacing:.1em;
}
.fbtn:active{transform:scale(.95)}
#fi{display:none}
.rlist{margin-top:32px;width:280px;display:flex;flex-direction:column;gap:6px}
.rhead{font-size:12px;opacity:.4;text-align:center;margin-bottom:4px}
.ritem{
  background:var(--panel-bg);border:none;padding:10px 16px;border-radius:8px;
  font-family:inherit;font-size:13px;color:var(--text);cursor:pointer;
  text-align:left;display:flex;justify-content:space-between;align-items:center;
  gap:8px;
}
.ritem:active{opacity:.7}
.rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rpct{font-size:11px;color:var(--accent);white-space:nowrap}
.rdel{
  background:none;border:none;color:var(--accent-light);font-size:14px;cursor:pointer;
  padding:2px 4px;flex-shrink:0;
}
.rdel:active{color:var(--accent)}

/* ===== READER ===== */
#reader{display:none;position:fixed;inset:0}
#reader.on{display:block}

/* メイン表示領域 */
#content{
  writing-mode:vertical-rl;
  text-orientation:mixed;
  line-height:1.85;
  padding-top:max(48px,env(safe-area-inset-top,48px));
  padding-bottom:max(48px,env(safe-area-inset-bottom,48px));
  padding-left:28px;
  padding-right:28px;
  height:100vh;
  width:100vw;
  overflow:hidden;
  word-break:break-all;
  text-align:justify;
  -webkit-user-select:text;user-select:text;
  position:absolute;top:0;left:0;
}
#content p{text-indent:1em;margin-bottom:.4em}

/* 測定コンテナ: 画面右外に配置、height/widthをvwで明示 */
#mc{
  writing-mode:vertical-rl;
  text-orientation:mixed;
  line-height:1.85;
  padding-top:max(48px,env(safe-area-inset-top,48px));
  padding-bottom:max(48px,env(safe-area-inset-bottom,48px));
  padding-left:28px;
  padding-right:28px;
  height:100vh;
  width:100vw;
  overflow:visible;
  word-break:break-all;
  text-align:justify;
  position:fixed;
  top:0;
  left:100vw;
  visibility:hidden;
  pointer-events:none;
  z-index:-1;
}
#mc p{text-indent:1em;margin-bottom:.4em}

/* ===== BARS ===== */
#tbar,#bbar{
  position:fixed;left:0;right:0;
  background:var(--panel-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;
}
#tbar{top:0;padding:max(12px,env(safe-area-inset-top,12px)) 12px 8px;display:flex;align-items:center;justify-content:space-between}
#bbar{bottom:0;padding:12px 16px max(12px,env(safe-area-inset-bottom,12px));display:flex;flex-direction:column;gap:8px}
#tbar.on,#bbar.on{opacity:1;pointer-events:auto}
.btitle{font-size:13px;opacity:.6;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px}
.brow{display:flex;align-items:center;gap:10px}
.b{
  background:none;border:1px solid var(--accent-light);color:var(--text);
  min-width:36px;height:36px;border-radius:8px;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:inherit;padding:0 6px;
}
.b:active{background:var(--accent);color:#fff}
.sw{flex:1;display:flex;align-items:center;gap:8px}
#slider{flex:1;accent-color:var(--accent)}
.pn{font-size:12px;opacity:.5;min-width:55px;text-align:center}

#prog{position:fixed;bottom:0;left:0;height:3px;background:var(--accent);z-index:60;transition:width .3s;pointer-events:none}

#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-14px);
  background:var(--accent);color:#fff;padding:7px 20px;border-radius:18px;font-size:13px;
  opacity:0;transition:opacity .3s,transform .3s;z-index:200;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ローディング */
#loading{
  position:fixed;inset:0;z-index:300;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#loading.on{opacity:1;pointer-events:auto}
.spinner{width:36px;height:36px;border:3px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltext{font-size:13px;opacity:.5;letter-spacing:.1em}
</style>
</head>
<body>
<div id="toast"></div>
<div id="loading"><div class="spinner"></div><div class="ltext" id="ltxt">ページ構築中…</div></div>

<!-- LANDING -->
<div id="landing">
  <div class="ltitle">縦書文庫</div>
  <div class="lsub">テキストリーダー</div>
  <button class="fbtn" onclick="$('fi').click()">ファイルを開く</button>
  <input type="file" id="fi" accept=".txt,.text,text/plain">
  <div class="rlist" id="rlist"></div>
</div>

<!-- READER -->
<div id="reader">
  <div id="content"></div>
  <div id="mc"></div>
  <div id="tbar">
    <button class="b" onclick="goHome()">✕ 戻る</button>
    <span class="btitle" id="btitle"></span>
    <button class="b" id="tbtn" onclick="togTheme()">🌙</button>
  </div>
  <div id="bbar">
    <div class="brow">
      <button class="b" onclick="adjF(-2)">A−</button>
      <button class="b" onclick="adjF(2)"><b>A+</b></button>
      <div class="sw">
        <input type="range" id="slider" min="0" max="1" value="0">
        <span class="pn" id="pn">1/1</span>
      </div>
    </div>
  </div>
  <div id="prog"></div>
</div>

<script>
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1600)}
function showLoading(b,msg){
  $('ltxt').textContent=msg||'ページ構築中…';
  $('loading').classList.toggle('on',b);
}

/* ══════════════════════════════════════
   IndexedDB
   DB名: tategaki-reader
   stores:
     books  : {id(書名), text, savedAt}   ← テキスト本体（最大5冊）
     pos    : {id(書名), paraIdx, pct}     ← 読書位置
══════════════════════════════════════ */
const DB_NAME='tategaki-reader';
const DB_VER=1;
const MAX_BOOKS=5;
const SPLIT_BYTES=900*1024; // 900KB超で分割

let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('books')) d.createObjectStore('books',{keyPath:'id'});
      if(!d.objectStoreNames.contains('pos'))   d.createObjectStore('pos',  {keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=()=>rej(req.error);
  });
}

function dbGet(store,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).get(key);
    req.onsuccess=()=>res(req.result||null);
    req.onerror=()=>rej(req.error);
  });
}
function dbPut(store,val){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).put(val);
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}
function dbGetAll(store){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=()=>rej(req.error);
  });
}
function dbDelete(store,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).delete(key);
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}

/* テキストをUTF-8バイト数で計算し、1MB超なら段落境界で分割 */
function splitText(text, baseName){
  const enc=new TextEncoder();
  const bytes=enc.encode(text).length;
  if(bytes <= SPLIT_BYTES) return [{id:baseName, text}];

  const lines=text.split('\n');
  const parts=[];
  let buf=[];
  let bufBytes=0;
  let partNum=1;

  for(const line of lines){
    const lb=enc.encode(line+'\n').length;
    if(bufBytes+lb > SPLIT_BYTES && buf.length>0){
      parts.push({id:`${baseName}（${partNum}）`, text:buf.join('\n')});
      partNum++;
      buf=[line];
      bufBytes=lb;
    } else {
      buf.push(line);
      bufBytes+=lb;
    }
  }
  if(buf.length>0) parts.push({id:`${baseName}（${partNum}）`, text:buf.join('\n')});
  return parts;
}

/* 書籍を保存（古いものを削除して最大5冊を維持） */
async function saveBook(id, text){
  // 既存リストを確認
  const all=await dbGetAll('books');
  // 同名が既にあれば更新、なければ古いものを削除
  if(!all.find(b=>b.id===id)){
    if(all.length>=MAX_BOOKS){
      // savedAtが最も古いものを削除
      const oldest=all.sort((a,b)=>a.savedAt-b.savedAt)[0];
      await dbDelete('books',oldest.id);
      await dbDelete('pos',oldest.id);
    }
  }
  await dbPut('books',{id, text, savedAt:Date.now()});
}

/* 読書位置の保存・読み込み */
async function savePos(id, paraIdx){
  const pct=paragraphs.length>1?Math.round(paraIdx/(paragraphs.length-1)*100):0;
  await dbPut('pos',{id, paraIdx, pct});
  // books の savedAt を更新して「最近使った」順にする
  const bk=await dbGet('books',id);
  if(bk){bk.savedAt=Date.now();await dbPut('books',bk);}
}
async function loadPos(id){
  const rec=await dbGet('pos',id);
  return rec||null;
}

/* ══ State ══ */
let raw='', fname='', fs=18, pg=0, tp=1, bars=false;
let paragraphs=[];
let pages=[];

/* ══ File 読み込み ══ */
$('fi').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f) return;
  const baseName=f.name.replace(/\.(txt|text)$/i,'');
  showLoading(true,'ファイル読み込み中…');

  const reader=new FileReader();
  reader.onload=async ev=>{
    const text=ev.target.result;
    // 分割して保存
    const parts=splitText(text,baseName);
    for(const p of parts) await saveBook(p.id, p.text);

    if(parts.length>1){
      toast(`${parts.length}パートに分割して保存しました`);
    }
    // 最初のパートを開く
    showLoading(false);
    openBook(parts[0].id, parts[0].text);
  };
  reader.readAsText(f,'UTF-8');
  e.target.value='';
});

/* ══ 書籍を開く ══ */
async function openBook(id, text){
  fname=id;
  raw=text;
  $('landing').classList.add('hide');
  $('reader').classList.add('on');
  $('btitle').textContent=fname;
  bars=false;
  showLoading(true,'ページ構築中…');

  // 2フレーム待ってDOM安定後に計測
  requestAnimationFrame(()=>requestAnimationFrame(async ()=>{
    buildPages();
    const posRec=await loadPos(fname);
    let startPage=0;
    if(posRec && posRec.paraIdx>0){
      startPage=findPageByParaIdx(posRec.paraIdx);
    }
    go(startPage,false);
    showLoading(false);
    if(posRec && posRec.paraIdx>0) toast(`${startPage+1}ページから再開`);
  }));
}

/* ══════════════════════════════════════
   ページネーション（DOM実測）
   縦書きでは列が右→左に増え、overflow は水平方向。
   #mc を left:100vw に配置し、scrollWidth で列幅合計を計測。
   usableWidth = innerWidth - padding-left - padding-right
══════════════════════════════════════ */
function getUsableWidth(){
  // 縦書きで1ページに入る「列幅の合計上限」
  // = viewport幅 - 左右padding
  const padL=28, padR=28;
  return window.innerWidth - padL - padR;
}

function buildPages(){
  paragraphs=raw.split('\n');
  while(paragraphs.length>0 && paragraphs[paragraphs.length-1].trim()===''){
    paragraphs.pop();
  }
  if(paragraphs.length===0) paragraphs=[''];

  pages=[];

  const mc=$('mc');
  mc.style.fontSize=fs+'px';
  mc.innerHTML='';

  const maxW=getUsableWidth();
  let pageStart=0;

  for(let i=0;i<paragraphs.length;i++){
    const p=document.createElement('p');
    p.textContent=paragraphs[i].trim()==='' ? '\u3000' : paragraphs[i];
    mc.appendChild(p);

    // scrollWidth = 現在コンテナに入っている全列の合計幅
    const currentW=mc.scrollWidth;

    if(currentW > maxW){
      if(i===pageStart){
        // 1段落だけで溢れる → そのまま1ページ確定
        pages.push({start:pageStart, end:i});
        pageStart=i+1;
        mc.innerHTML='';
      } else {
        // 直前まででページ確定、この段落を次ページ先頭に
        pages.push({start:pageStart, end:i-1});
        pageStart=i;
        mc.innerHTML='';
        const p2=document.createElement('p');
        p2.textContent=paragraphs[i].trim()==='' ? '\u3000' : paragraphs[i];
        mc.appendChild(p2);
      }
    }
  }

  // 残り
  if(pageStart<paragraphs.length){
    pages.push({start:pageStart, end:paragraphs.length-1});
  }

  mc.innerHTML='';
  if(pages.length===0) pages=[{start:0,end:0}];
  tp=pages.length;
}

/* ══ Render ══ */
function render(n){
  n=Math.max(0,Math.min(tp-1,n));
  pg=n;
  const el=$('content');
  el.style.fontSize=fs+'px';
  el.innerHTML='';
  const page=pages[n];
  for(let i=page.start;i<=page.end;i++){
    const p=document.createElement('p');
    const text=paragraphs[i]||'';
    p.textContent=text.trim()==='' ? '\u3000' : text;
    el.appendChild(p);
  }
  updUI();
}

function updUI(){
  $('pn').textContent=`${pg+1} / ${tp}`;
  $('slider').max=Math.max(0,tp-1);
  $('slider').value=pg;
  $('prog').style.width=(tp>1?(pg/(tp-1))*100:0)+'%';
}

/* ══ Navigation ══ */
function go(n,anim){
  n=Math.max(0,Math.min(tp-1,n));
  if(anim && n!==pg){
    $('content').style.opacity='0.15';
    setTimeout(()=>{
      render(n);
      $('content').style.opacity='1';
      const anchor=pages.length>0?pages[pg].start:0;
      savePos(fname,anchor).catch(()=>{});
    },120);
  } else {
    render(n);
  }
}
function prev(){go(pg-1,true)}
function next(){go(pg+1,true)}

/* ══ Touch ══ */
let tx=0,ty=0,tt=0,tm=false;
document.addEventListener('touchstart',e=>{
  if(!$('reader').classList.contains('on')) return;
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();tm=false;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!$('reader').classList.contains('on')) return;
  if(Math.abs(e.touches[0].clientX-tx)>12||Math.abs(e.touches[0].clientY-ty)>12) tm=true;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!$('reader').classList.contains('on')) return;
  const tgt=e.target;
  if(tgt.closest('#tbar')||tgt.closest('#bbar')) return;
  const dt=Date.now()-tt;
  const ex=e.changedTouches[0].clientX;
  const dx=ex-tx;
  if(tm&&Math.abs(dx)>50&&dt<500){dx>0?prev():next();return}
  if(!tm&&dt<300){
    if(bars){togBars();return}
    const w=window.innerWidth;
    if(ex>w*0.65) prev();
    else if(ex<w*0.35) next();
    else togBars();
  }
},{passive:true});

$('slider').addEventListener('input',e=>go(+e.target.value,false));

/* ══ Font size ══ */
function adjF(d){
  const anchor=pages.length>0?pages[pg].start:0;
  fs=Math.max(12,Math.min(40,fs+d));
  showLoading(true);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    buildPages();
    const tgt=findPageByParaIdx(anchor);
    go(tgt,false);
    showLoading(false);
    try{localStorage.setItem('tr-fs',fs)}catch(e){}
  }));
}

function findPageByParaIdx(idx){
  for(let i=0;i<pages.length;i++){
    if(pages[i].start<=idx && idx<=pages[i].end) return i;
    if(pages[i].start>idx) return Math.max(0,i-1);
  }
  return Math.max(0,pages.length-1);
}

/* ══ Theme ══ */
function togTheme(){
  const dk=!document.body.hasAttribute('data-theme');
  document.body.toggleAttribute('data-theme',dk);
  $('tbtn').textContent=dk?'☀️':'🌙';
  try{localStorage.setItem('tr-th',dk?'d':'l')}catch(e){}
}

/* ══ Bars ══ */
function togBars(){
  bars=!bars;
  $('tbar').classList.toggle('on',bars);
  $('bbar').classList.toggle('on',bars);
}

/* ══ Home ══ */
function goHome(){
  if(pages.length>0){
    const anchor=pages[pg].start;
    savePos(fname,anchor).catch(()=>{});
  }
  $('reader').classList.remove('on');
  $('landing').classList.remove('hide');
  bars=false;$('tbar').classList.remove('on');$('bbar').classList.remove('on');
  showRecent();
}

/* ══ 最近の本リスト ══ */
async function showRecent(){
  const el=$('rlist');
  el.innerHTML='';
  const all=await dbGetAll('books');
  if(!all.length) return;

  const sorted=all.sort((a,b)=>b.savedAt-a.savedAt);
  el.innerHTML='<div class="rhead">最近の本</div>';

  for(const bk of sorted){
    const posRec=await dbGet('pos',bk.id);
    const pct=posRec?posRec.pct:0;

    const row=document.createElement('div');
    row.className='ritem';
    row.innerHTML=`
      <span class="rname">${bk.id}</span>
      <span class="rpct">${pct}%</span>
      <button class="rdel" title="削除">✕</button>
    `;
    // 本文エリアタップ → 開く
    row.querySelector('.rname').onclick=()=>openBook(bk.id,bk.text);
    row.querySelector('.rpct').onclick=()=>openBook(bk.id,bk.text);
    // 削除ボタン
    row.querySelector('.rdel').onclick=async(e)=>{
      e.stopPropagation();
      await dbDelete('books',bk.id);
      await dbDelete('pos',bk.id);
      showRecent();
    };
    el.appendChild(row);
  }
}

/* ══ Keyboard ══ */
document.addEventListener('keydown',e=>{
  if(!$('reader').classList.contains('on')) return;
  if(e.key==='ArrowLeft') next();
  if(e.key==='ArrowRight') prev();
});

/* ══ Resize ══ */
let rT;
window.addEventListener('resize',()=>{
  clearTimeout(rT);
  rT=setTimeout(()=>{
    if(!$('reader').classList.contains('on')) return;
    const anchor=pages.length>0?pages[pg].start:0;
    showLoading(true);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      buildPages();
      go(findPageByParaIdx(anchor),false);
      showLoading(false);
    }));
  },300);
});

/* ══ Init ══ */
(async()=>{
  try{
    if(localStorage.getItem('tr-th')==='d'){
      document.body.setAttribute('data-theme','dark');
      $('tbtn').textContent='☀️';
    }
    const f=localStorage.getItem('tr-fs');
    if(f) fs=+f;
  }catch(e){}

  await openDB();
  showRecent();

  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
